<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segmentation Test Harness</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        padding: 24px;
        min-height: 100vh;
      }

      h1 {
        font-size: 1.3rem;
        margin-bottom: 6px;
      }
      p.subtitle {
        color: #aaa;
        font-size: 0.85rem;
        margin-bottom: 20px;
      }

      /* ── upload strip ────────────────────────────────────────────── */
      .upload-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      label.pick-btn {
        display: inline-block;
        padding: 9px 18px;
        background: #3b82f6;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.15s;
      }
      label.pick-btn:hover {
        background: #2563eb;
      }
      input[type="file"] {
        display: none;
      }

      #status {
        font-size: 0.85rem;
        color: #facc15;
      }

      /* ── canvas area ─────────────────────────────────────────────── */
      .canvas-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 28px;
      }

      .canvas-card {
        position: relative;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 8px;
        overflow: hidden;
      }

      .canvas-card canvas {
        display: block;
      }

      .canvas-label {
        position: absolute;
        top: 6px;
        left: 8px;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 4px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .canvas-badge {
        position: absolute;
        bottom: 6px;
        right: 8px;
        background: rgba(0, 0, 0, 0.65);
        color: #a3e635;
        font-size: 0.72rem;
        padding: 2px 7px;
        border-radius: 4px;
      }

      /* ── JSON result panel ───────────────────────────────────────── */
      #result-section h2 {
        font-size: 1rem;
        margin-bottom: 10px;
        color: #a3e635;
      }

      .meta-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .meta-chip {
        padding: 5px 12px;
        border-radius: 6px;
        background: #1e293b;
        border: 1px solid #334155;
        font-size: 0.82rem;
      }

      .meta-chip .label {
        color: #94a3b8;
        margin-right: 6px;
      }
      .meta-chip .value {
        font-weight: 700;
      }
      .meta-chip.warn {
        border-color: #f59e0b;
      }
      .meta-chip.warn .value {
        color: #fbbf24;
      }
      .meta-chip.ok .value {
        color: #4ade80;
      }

      pre#json-out {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 16px;
        font-size: 0.78rem;
        line-height: 1.6;
        overflow-x: auto;
        max-height: 420px;
        overflow-y: auto;
        color: #94a3b8;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <h1>Segmentation Test Harness</h1>
    <p class="subtitle">
      Runs <code>segmentGarment()</code> entirely in-browser — model weights are
      downloaded once from Hugging Face and cached by the browser.
    </p>

    <div class="upload-row">
      <label class="pick-btn" for="file-input">Choose garment photo</label>
      <input type="file" id="file-input" accept="image/*" />
      <span id="status">Waiting for image…</span>
    </div>

    <!-- Canvases injected here at runtime -->
    <div class="canvas-grid" id="canvas-grid"></div>

    <!-- Summary + raw JSON -->
    <div id="result-section" style="display: none">
      <h2>Result</h2>
      <div class="meta-row" id="meta-row"></div>
      <pre id="json-out"></pre>
    </div>

    <script type="module">
      import { segmentGarment } from "/src/services/segmentation.js";

      // ── region display config ────────────────────────────────────────────────
      const REGION_CONFIG = {
        frontPanel: { label: "Front Panel", color: [59, 130, 246, 160] }, // blue
        sleeveLeft: { label: "Sleeve Left", color: [34, 197, 94, 160] }, // green
        sleeveRight: { label: "Sleeve Right", color: [234, 179, 8, 160] }, // yellow
        backPanel: { label: "Back Panel", color: [156, 163, 175, 100] }, // grey (always null)
      };

      const CANVAS_SIZE = 320; // display size in CSS pixels

      // ── helpers ──────────────────────────────────────────────────────────────

      function setStatus(msg, color = "#facc15") {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.style.color = color;
      }

      /**
       * Draw the original image, then paint the region mask as a translucent overlay.
       *
       * @param {HTMLImageElement} img        - Original photo element (fully loaded).
       * @param {string}           regionKey  - Key into REGION_CONFIG.
       * @param {RegionData}       regionData - From segmentGarment() result.
       * @param {number}           maskW      - Width of the mask grid (image width from model).
       * @param {number}           maskH      - Height of the mask grid.
       */
      function drawRegionCanvas(img, regionKey, regionData, maskW, maskH) {
        const cfg = REGION_CONFIG[regionKey];
        const grid = document.getElementById("canvas-grid");

        const card = document.createElement("div");
        card.className = "canvas-card";

        const canvas = document.createElement("canvas");
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;
        card.appendChild(canvas);

        // Region label badge (top-left)
        const badge = document.createElement("div");
        badge.className = "canvas-label";
        badge.textContent = cfg.label;
        card.appendChild(badge);

        // Confidence badge (bottom-right)
        const confBadge = document.createElement("div");
        confBadge.className = "canvas-badge";
        confBadge.textContent = regionData.mask
          ? `${(regionData.confidence * 100).toFixed(1)}%  |  ${regionData.pixelArea.toLocaleString()} px`
          : "not visible";
        card.appendChild(confBadge);

        grid.appendChild(card);

        const ctx = canvas.getContext("2d");

        // Draw the source image scaled to CANVAS_SIZE × CANVAS_SIZE
        ctx.drawImage(img, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

        if (!regionData.mask) return; // back panel or absent region — just show image

        // Build a full-RGBA ImageData for the overlay from the binary mask.
        // The mask was built from the model output which has dimensions maskW × maskH.
        const overlayData = new ImageData(maskW, maskH);
        const [r, g, b, a] = cfg.color;
        for (let i = 0; i < regionData.mask.length; i++) {
          if (regionData.mask[i]) {
            const base = i * 4;
            overlayData.data[base] = r;
            overlayData.data[base + 1] = g;
            overlayData.data[base + 2] = b;
            overlayData.data[base + 3] = a;
          }
        }

        // Paint the overlay onto a temporary off-screen canvas at mask resolution,
        // then stretch it onto the display canvas so it aligns with the photo.
        const tmp = document.createElement("canvas");
        tmp.width = maskW;
        tmp.height = maskH;
        tmp.getContext("2d").putImageData(overlayData, 0, 0);

        ctx.drawImage(tmp, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
      }

      // ── main handler ─────────────────────────────────────────────────────────

      document
        .getElementById("file-input")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          // Reset UI
          document.getElementById("canvas-grid").innerHTML = "";
          document.getElementById("result-section").style.display = "none";
          document.getElementById("meta-row").innerHTML = "";

          setStatus(
            "Loading model and running segmentation… (first run downloads ~400 MB)",
            "#facc15",
          );

          // Pre-load image so we can draw it onto canvases
          const imgUrl = URL.createObjectURL(file);
          const img = new Image();
          await new Promise((res, rej) => {
            img.onload = res;
            img.onerror = rej;
            img.src = imgUrl;
          });

          let result;
          try {
            result = await segmentGarment(file);
          } catch (err) {
            setStatus(`Unexpected error: ${err.message}`, "#f87171");
            URL.revokeObjectURL(imgUrl);
            return;
          }

          URL.revokeObjectURL(imgUrl);

          if (result.error) {
            setStatus(`Error: ${result.message}`, "#f87171");
            return;
          }

          setStatus("Done.", "#4ade80");

          // The model runs on a fixed 512×512 input; derive actual mask dimensions
          // from the first non-null mask we find.
          const firstMask = Object.values(result.regions).find((r) => r.mask);
          const maskW = firstMask
            ? Math.round(
                Math.sqrt(firstMask.mask.length * (img.width / img.height)),
              )
            : img.width;
          const maskH = firstMask
            ? Math.round(firstMask.mask.length / maskW)
            : img.height;

          // Draw a canvas per region
          for (const regionKey of [
            "frontPanel",
            "sleeveLeft",
            "sleeveRight",
            "backPanel",
          ]) {
            drawRegionCanvas(
              img,
              regionKey,
              result.regions[regionKey],
              maskW,
              maskH,
            );
          }

          // ── meta chips ────────────────────────────────────────────────────────
          const metaRow = document.getElementById("meta-row");

          const categoryChip = document.createElement("div");
          categoryChip.className = "meta-chip ok";
          categoryChip.innerHTML = `<span class="label">Garment</span><span class="value">${result.garmentCategory}</span>`;
          metaRow.appendChild(categoryChip);

          const confChip = document.createElement("div");
          confChip.className = `meta-chip ${result.lowConfidence ? "warn" : "ok"}`;
          confChip.innerHTML = `<span class="label">Low confidence</span><span class="value">${result.lowConfidence ? "YES" : "no"}</span>`;
          metaRow.appendChild(confChip);

          for (const [key, data] of Object.entries(result.regions)) {
            if (key === "backPanel") continue;
            const chip = document.createElement("div");
            chip.className = "meta-chip";
            chip.innerHTML = `<span class="label">${REGION_CONFIG[key].label}</span><span class="value">${(data.confidence * 100).toFixed(1)}%</span>`;
            metaRow.appendChild(chip);
          }

          // ── JSON panel ────────────────────────────────────────────────────────
          // Omit bulky Uint8Array buffers from the printed JSON
          const printable = {
            garmentCategory: result.garmentCategory,
            lowConfidence: result.lowConfidence,
            rawLabels: result.rawLabels,
            regions: Object.fromEntries(
              Object.entries(result.regions).map(([k, v]) => [
                k,
                {
                  pixelArea: v.pixelArea,
                  confidence: v.confidence,
                  mask: v.mask ? `Uint8Array(${v.mask.length})` : null,
                },
              ]),
            ),
          };

          document.getElementById("json-out").textContent = JSON.stringify(
            printable,
            null,
            2,
          );
          document.getElementById("result-section").style.display = "block";
        });
    </script>
  </body>
</html>
